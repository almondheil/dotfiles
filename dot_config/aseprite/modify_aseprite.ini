#!/usr/bin/env chezmoi_modify_manager

source auto

# Add your ignores and transforms here
#ignore section "my-section"
#ignore "exact section name without brackets" "exact key name"
#ignore regex "section.*" "key_prefix_.*"
#transform "section" "key" transform_name read="the docs" for="more detail on transforms"
ignore section "GfxMode"
ignore section "MiniEditor"
ignore section "RecentFiles"
ignore section "RecentPaths"
ignore section "SpriteSize"
ignore section "bg"
ignore section "canvas_size"
ignore section "file_selector"
ignore section "filters"
ignore section "new_file"
ignore section "script_access"
ignore section "shades"
ignore section "updater"

ignore "color_bar" "bg_color"
ignore "color_bar" "fg_color"
ignore "color_bar" "selector"

ignore regex ".*" "[bf]g_color"
ignore regex ".*" "color"
ignore regex ".*" ".+?_splitter"
ignore regex ".*" "color"
ignore regex ".*" "WindowPos"

# tools have colors etc inside so gotta ignore those multi-matches
no-warn-multiple-key-matches
ignore regex "tool.*" ".*"
